# ============================================
# Chatbot Mantenimiento Industrial — Compose de DESARROLLO
# ============================================
# Uso:
#   docker compose -f docker-compose.dev.yml up -d postgres
#   docker compose -f docker-compose.dev.yml logs -f postgres
#   docker compose -f docker-compose.dev.yml down
#
# El servicio `backend` está comentado. Se habilitará en la Sub-fase 1.3.
# ============================================

name: chatbot-mantenimiento

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: chatbot-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Hace que Postgres use la zona horaria del host
      TZ: Europe/Madrid
      PGTZ: Europe/Madrid
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Scripts de inicialización (se ejecutan solo en el primer arranque,
      # cuando el directorio de datos está vacío)
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - chatbot-network

  # --------------------------------------------
  # backend (FastAPI) — habilitar en Sub-fase 1.3
  # --------------------------------------------
  # backend:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   container_name: chatbot-backend-dev
  #   restart: unless-stopped
  #   environment:
  #     DATABASE_URL: ${DATABASE_URL}
  #     BACKEND_HOST: ${BACKEND_HOST}
  #     BACKEND_PORT: ${BACKEND_PORT}
  #     BACKEND_ENV: ${BACKEND_ENV}
  #     LOG_LEVEL: ${LOG_LEVEL}
  #     CORS_ORIGINS: ${CORS_ORIGINS}
  #   ports:
  #     - "${BACKEND_PORT}:8000"
  #   volumes:
  #     - ./backend:/app
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   networks:
  #     - chatbot-network

volumes:
  postgres_data:
    name: chatbot_postgres_data

networks:
  chatbot-network:
    name: chatbot-network
    driver: bridge
